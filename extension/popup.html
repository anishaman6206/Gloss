<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="popup.css" />
    <style>
      body {
        width: 300px;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div class="popup-root">
      <div class="toolbar-title-row">
        <span class="toolbar-brand">
          <span class="toolbar-brand-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
          </span>
          <span class="toolbar-title">Gloss</span>
        </span>
        <button id="open-settings" class="toolbar-icon-btn" type="button" title="Settings" aria-label="Settings">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        </button>
      </div>

      <section id="onboarding-view" class="onboarding hidden">
        <div class="onboarding-icon-wrap" aria-hidden="true">
          <span class="onboarding-blob onboarding-blob-a"></span>
          <span class="onboarding-blob onboarding-blob-b"></span>
          <div class="onboarding-icon">
            <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="#1cb0f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
          </div>
        </div>
        <h1 class="onboarding-title">Learn every word you actually read.</h1>
        <p class="onboarding-copy">
          Select any word on any page — Gloss shows you what it means right there, in context.
        </p>
        <div class="onboarding-hint">
          <span class="onboarding-hint-dot" aria-hidden="true"></span>
          Try it: highlight a word on this page
        </div>
      </section>

      <section id="recent-view" class="hidden">
        <div class="stats-row hidden" id="stats-row">
          <div class="stat-tile">
            <div class="stat-value" id="stat-streak">–</div>
            <div class="stat-label">🔥 Day streak</div>
          </div>
          <div class="stat-tile">
            <div class="stat-value" id="stat-today">–</div>
            <div class="stat-label">Saved today</div>
          </div>
        </div>
        <p class="stats-signin-prompt hidden" id="stats-signin-prompt">
          <a href="https://gloss-theta.vercel.app" target="_blank" rel="noopener noreferrer">Sign in to Gloss</a>
          to see your streak
        </p>

        <p class="section-label">Recent lookups</p>
        <ul id="recent-list" class="toolbar-list"></ul>
      </section>

      <div class="toolbar-footer" id="footer-onboarding">
        <button id="open-library-onboarding" class="toolbar-text-link" type="button">
          Peek at your Gloss library
        </button>
      </div>

      <div class="toolbar-footer toolbar-btn-row hidden" id="footer-dashboard">
        <button id="open-library" class="toolbar-link-btn" type="button">
          <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
          Library
        </button>
        <button id="open-review" class="toolbar-ghost-btn" type="button">
          <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
          Review
        </button>
      </div>
    </div>
    <script src="shared.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
