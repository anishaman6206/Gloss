<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Gloss PDF Reader</title>
    <link rel="stylesheet" href="viewer.css" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="pdf-toolbar">
      <span class="pdf-toolbar-brand">
        <span class="pdf-toolbar-brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
        </span>
        Gloss PDF Reader
      </span>
      <span id="doc-title" class="pdf-toolbar-title"></span>

      <div class="pdf-toolbar-controls" id="page-controls" hidden>
        <button id="prev-page" class="pdf-toolbar-btn" type="button" title="Previous page" aria-label="Previous page">‹</button>
        <span id="page-indicator" class="pdf-page-indicator">1 / 1</span>
        <button id="next-page" class="pdf-toolbar-btn" type="button" title="Next page" aria-label="Next page">›</button>
      </div>

      <div class="pdf-toolbar-controls" id="zoom-controls" hidden>
        <button id="zoom-out" class="pdf-toolbar-btn" type="button" title="Zoom out" aria-label="Zoom out">−</button>
        <span id="zoom-indicator" class="pdf-page-indicator">100%</span>
        <button id="zoom-in" class="pdf-toolbar-btn" type="button" title="Zoom in" aria-label="Zoom in">+</button>
      </div>

      <a id="open-original" class="pdf-toolbar-link" href="#" target="_blank" rel="noopener noreferrer">Open original</a>
    </header>

    <main id="status" class="pdf-status" hidden></main>
    <main id="viewer" class="pdf-viewer" hidden></main>

    <script src="shared.js"></script>
    <script type="module" src="viewer.js"></script>
    <!-- Same content script the rest of the web uses for the lookup popup —
         it's plain page script here (content_scripts can't target
         chrome-extension:// pages), but unmodified: selecting rendered PDF
         text is indistinguishable from selecting any other page's text. -->
    <script src="content.js"></script>
  </body>
</html>
