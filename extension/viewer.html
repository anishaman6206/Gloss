<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Gloss PDF Reader</title>
    <link rel="stylesheet" href="viewer.css" />
  </head>
  <body>
    <header class="pdf-toolbar">
      <span class="pdf-toolbar-brand">
        <span class="pdf-toolbar-brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
        </span>
        Gloss PDF Reader
      </span>
      <span id="doc-title" class="pdf-toolbar-title"></span>
      <a id="open-original" class="pdf-toolbar-link" href="#" target="_blank" rel="noopener noreferrer">Open original</a>
    </header>

    <main id="status" class="pdf-status" hidden></main>
    <main id="viewer" class="pdf-viewer" hidden></main>

    <script src="shared.js"></script>
    <script type="module" src="viewer.js"></script>
  </body>
</html>
